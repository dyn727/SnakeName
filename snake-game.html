<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇小游戏</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { margin-bottom: 12px; }
    .panel {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #475569;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 16px;
      flex-wrap: wrap;
    }
    .hud-item {
      background: rgba(30, 41, 59, 0.8);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      white-space: nowrap;
    }
    canvas {
      background: #020617;
      border: 2px solid #38bdf8;
      border-radius: 8px;
      box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.08);
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #22c55e;
      color: white;
    }
    button:hover { background: #16a34a; }
    .music-btn {
      background: #0f172a;
      border: 1px solid #475569;
      color: #f8fafc;
    }
    .music-btn.active { background: #22c55e; color: white; }
    .tip { margin-top: 10px; color: #cbd5e1; font-size: 13px; }
    .mode-select {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      background: rgba(30, 41, 59, 0.8);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    .mode-select select {
      border: none;
      border-radius: 6px;
      padding: 6px 8px;
      background: #0f172a;
      color: #f8fafc;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay.active { display: flex; }
    .overlay-card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      border-radius: 16px;
      padding: 24px 28px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      min-width: 260px;
    }
    .overlay-card h2 { margin: 0 0 10px; color: #f8fafc; }
    .overlay-card p { margin: 8px 0; color: #cbd5e1; }
    .overlay-card button { margin-top: 12px; }
    .start-title { animation: popIn 0.8s ease; }
    .pulse { animation: pulse 1.2s infinite; }
    @keyframes popIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="overlay active" id="startOverlay">
    <div class="overlay-card">
      <h2 class="start-title">🐍 贪吃蛇挑战</h2>
      <p>吃掉食物，成长为更长的蛇。</p>
      <div class="controls">
        <label class="mode-select">
          <span>模式</span>
          <select id="modeSelect">
            <option value="classic">经典模式</option>
            <option value="timed">计时模式</option>
          </select>
        </label>
        <button id="startOverlayBtn" class="pulse">开始游戏</button>
      </div>
      <p class="tip">方向键移动，空格键暂停/继续</p>
    </div>
  </div>

  <div class="overlay" id="pauseOverlay">
    <div class="overlay-card">
      <h2>游戏已暂停</h2>
      <p>按空格键或点击下方按钮继续。</p>
      <button id="resumeBtn">继续游戏</button>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-card">
      <h2 id="gameOverTitle">游戏结束</h2>
      <p>本次得分：<span id="finalScore">0</span></p>
      <p>最高分：<span id="highScoreOverlay">0</span></p>
      <div class="controls">
        <button id="overlayRestartBtn">再玩一次</button>
        <button id="backToStartBtn">返回开始页</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <h1>🐍 贪吃蛇小游戏</h1>
    <div class="hud">
      <div class="hud-item">得分：<span id="score">0</span></div>
      <div class="hud-item">最高分：<span id="highScore">0</span></div>
      <div class="hud-item">速度：<span id="speed">160</span>ms</div>
      <div class="hud-item">模式：<span id="modeLabel">经典</span></div>
      <div class="hud-item">关卡：<span id="level">1</span></div>
      <div class="hud-item">时间：<span id="timer">--</span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">
      <button id="startBtn">开始游戏</button>
      <button id="restartBtn">重新开始</button>
      <button id="pauseBtn">暂停</button>
      <button id="musicBtn" class="music-btn active">🎵 音乐: 开</button>
    </div>
    <div class="tip">方向键控制，吃到食物后会增长并变快。</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const highScoreOverlayEl = document.getElementById('highScoreOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const speedEl = document.getElementById('speed');
    const modeLabelEl = document.getElementById('modeLabel');
    const levelEl = document.getElementById('level');
    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const startOverlay = document.getElementById('startOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const overlayRestartBtn = document.getElementById('overlayRestartBtn');
    const backToStartBtn = document.getElementById('backToStartBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const startOverlayBtn = document.getElementById('startOverlayBtn');
    const modeSelect = document.getElementById('modeSelect');
    const gameOverTitleEl = document.getElementById('gameOverTitle');
    const musicBtn = document.getElementById('musicBtn');

    const grid = 20;
    const tileCount = canvas.width / grid;
    const initialSpeed = 160;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let dx = 1;
    let dy = 0;
    let score = 0;
    let speed = initialSpeed;
    let gameTimer = null;
    let countdownTimer = null;
    let highScore = Number(localStorage.getItem('snakeHighScore') || 0);
    let isPaused = false;
    let isGameRunning = false;
    let gameMode = 'classic';
    let level = 1;
    let timeLeft = 60;
    let audioCtx = null;
    let musicEnabled = true;
    let bgMusicGain = null;
    let bgMusicLoopTimer = null;

    highScoreEl.textContent = highScore;
    updateHud();
    draw();

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', volume = 0.03, delay = 0) {
      const ctx = ensureAudioContext();
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = freq;
      gain.gain.value = volume;
      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start(ctx.currentTime + delay);
      oscillator.stop(ctx.currentTime + delay + duration);
    }

    function playStartSound() { playTone(523, 0.1, 'sine', 0.03); setTimeout(() => playTone(659, 0.12, 'sine', 0.03), 90); }
    function playEatSound() { playTone(660, 0.08, 'triangle', 0.03); setTimeout(() => playTone(880, 0.08, 'triangle', 0.025), 70); }
    function playPauseSound() { playTone(392, 0.08, 'square', 0.025); }
    function playGameOverSound() { playTone(220, 0.18, 'sawtooth', 0.03); setTimeout(() => playTone(180, 0.18, 'sawtooth', 0.025), 140); }

    function setBackgroundMusic() {
      if (!musicEnabled || !isGameRunning) return;
      ensureAudioContext();
      if (bgMusicGain) return;

      const ctx = audioCtx;
      const gainNode = ctx.createGain();
      gainNode.gain.value = 0.02;
      gainNode.connect(ctx.destination);
      bgMusicGain = gainNode;

      const melody = [261.63, 293.66, 329.63, 349.23, 392.0, 349.23, 329.63, 293.66];
      const rhythm = [0.35, 0.25, 0.25, 0.25, 0.35, 0.25, 0.25, 0.5];
      let index = 0;

      function playStep() {
        if (!bgMusicGain || !isGameRunning || !musicEnabled) return;
        const freq = melody[index % melody.length];
        const duration = rhythm[index % rhythm.length];
        const osc = ctx.createOscillator();
        const oscGain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        oscGain.gain.value = 0.0001;
        osc.connect(oscGain);
        oscGain.connect(gainNode);
        osc.start();
        oscGain.gain.exponentialRampToValueAtTime(0.025, ctx.currentTime + 0.04);
        oscGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        osc.stop(ctx.currentTime + duration + 0.02);
        index += 1;
        bgMusicLoopTimer = setTimeout(playStep, duration * 1000 + 80);
      }

      playStep();
    }

    function stopBackgroundMusic() {
      if (bgMusicLoopTimer) {
        clearTimeout(bgMusicLoopTimer);
        bgMusicLoopTimer = null;
      }
      if (bgMusicGain) {
        bgMusicGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        bgMusicGain.disconnect();
        bgMusicGain = null;
      }
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      musicBtn.textContent = musicEnabled ? '🎵 音乐: 开' : '🔈 音乐: 关';
      musicBtn.classList.toggle('active', musicEnabled);
      if (!musicEnabled) {
        stopBackgroundMusic();
      } else if (isGameRunning) {
        setBackgroundMusic();
      }
    }

    function updateHud() {
      scoreEl.textContent = score;
      speedEl.textContent = speed;
      modeLabelEl.textContent = gameMode === 'timed' ? '计时' : '经典';
      levelEl.textContent = level;
      timerEl.textContent = gameMode === 'timed' ? `${timeLeft}s` : '--';
    }

    function startGame() {
      if (gameTimer) clearInterval(gameTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      isPaused = false;
      isGameRunning = true;
      gameMode = modeSelect.value;
      level = 1;
      timeLeft = gameMode === 'timed' ? 60 : 0;
      startOverlay.classList.remove('active');
      pauseOverlay.classList.remove('active');
      gameOverOverlay.classList.remove('active');
      snake = [{ x: 10, y: 10 }];
      food = randomFood();
      dx = 1;
      dy = 0;
      score = 0;
      speed = initialSpeed;
      updateHud();
      draw();
      gameTimer = setInterval(update, speed);
      if (gameMode === 'timed') {
        countdownTimer = setInterval(updateCountdown, 1000);
      }
      playStartSound();
      setBackgroundMusic();
    }

    function restartGame() {
      startGame();
    }

    function showStartScreen() {
      if (gameTimer) clearInterval(gameTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      gameTimer = null;
      countdownTimer = null;
      isGameRunning = false;
      isPaused = false;
      gameOverOverlay.classList.remove('active');
      pauseOverlay.classList.remove('active');
      startOverlay.classList.add('active');
      stopBackgroundMusic();
    }

    function togglePause() {
      if (!isGameRunning) return;
      if (isPaused) {
        resumeGame();
      } else {
        pauseGame();
      }
    }

    function pauseGame() {
      if (!isGameRunning || isPaused) return;
      clearInterval(gameTimer);
      clearInterval(countdownTimer);
      isPaused = true;
      pauseOverlay.classList.add('active');
      playPauseSound();
      stopBackgroundMusic();
    }

    function resumeGame() {
      if (!isGameRunning || !isPaused) return;
      isPaused = false;
      pauseOverlay.classList.remove('active');
      gameTimer = setInterval(update, speed);
    }

    function updateCountdown() {
      if (gameMode !== 'timed') return;
      if (timeLeft <= 0) {
        gameOver('时间到！');
        return;
      }
      timeLeft -= 1;
      updateHud();
    }

    function randomFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
      return newFood;
    }

    function update() {
      if (!isGameRunning || isPaused) return;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some((segment, index) => index > 0 && segment.x === head.x && segment.y === head.y)) {
        gameOver('撞墙了！');
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        speed = Math.max(80, speed - 5);
        if (score % 50 === 0) {
          level += 1;
        }
        playEatSound();
        food = randomFood();
      } else {
        snake.pop();
      }
      updateHud();
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(food.x * grid, food.y * grid, grid, grid);
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#22c55e' : '#7dd3fc';
        ctx.fillRect(segment.x * grid, segment.y * grid, grid, grid);
      });
    }

    function gameOver(message) {
      isGameRunning = false;
      clearInterval(gameTimer);
      clearInterval(countdownTimer);
      gameOverTitleEl.textContent = message;
      finalScoreEl.textContent = score;
      highScore = Math.max(highScore, score);
      highScoreEl.textContent = highScore;
      highScoreOverlayEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
      isPaused = false;
      gameOverOverlay.classList.add('active');
      stopBackgroundMusic();
      playGameOverSound();
    }

    function handleInput(event) {
      switch (event.code) {
        case 'ArrowUp':
          if (dy === 0) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (dy === 0) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (dx === 0) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (dx === 0) { dx = 1; dy = 0; }
          break;
        case 'Space':
          if (!isGameRunning) { startGame(); } else { togglePause(); }
          break;
      }
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);
    pauseBtn.addEventListener('click', togglePause);
    musicBtn.addEventListener('click', toggleMusic);
    overlayRestartBtn.addEventListener('click', startGame);
    backToStartBtn.addEventListener('click', showStartScreen);
    resumeBtn.addEventListener('click', resumeGame);
    startOverlayBtn.addEventListener('click', startGame);
    modeSelect.addEventListener('change', () => {
      gameMode = modeSelect.value;
      updateHud();
    });
    window.addEventListener('keydown', handleInput);
  </script>
</body>
</html>
